name: LinkedIn Job Scraper

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes
  workflow_dispatch:          # allows manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-playwright
          restore-keys: ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          pip install playwright nest_asyncio pandas requests

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium
          restore-keys: ${{ runner.os }}-playwright-

      - name: Install Playwright Chromium
        run: python -m playwright install chromium --with-deps

      - name: Run scraper
        run: python linkedin_scraper.py > jobs_output.json
        env:
          PYTHONUNBUFFERED: "1"

      - name: Send to n8n webhook
        run: |
          python send_to_n8n.py
        env:
          N8N_WEBHOOK_URL: https://kinley-nongeologic-evanescently.ngrok-free.dev/webhook/linkedin-jobs
